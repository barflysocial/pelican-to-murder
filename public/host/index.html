<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Pelican to Murder — Host</title>
  <link rel="stylesheet" href="/shared/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div>
        <h1>Pelican to Murder Host</h1>
        <small>Case 001 · Pelican to Mars · Full Hosted Version</small>
      </div>
      <div class="statusPills">
        <span class="pill good">Host</span>
        <span class="pill">Round Structure Enabled</span>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section class="card">
      <h2>Create Table Session</h2>
      <div class="row">
        <div>
          <label>Table / Team Name</label>
          <input id="tableName" value="Team 1" />
        </div>
        <div>
          <label>Truth Pack</label>
          <select id="truthPackSelect"></select>
        </div>
      </div>
      <div class="actions" style="margin-top:14px">
        <button id="createBtn">Create Session</button>
        <button class="secondary" id="refreshBtn">Refresh</button>
      </div>
      <p class="mini">Player QR URL format: <b>/player/?code=SESSIONCODE</b></p>
    </section>

    <section class="card">
      <h2>Active Tables</h2>
      <div id="tables"></div>
    </section>
  </main>

  <script src="/host/host.js"></script>
</body>
</html>
