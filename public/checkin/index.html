<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Pelican to Murder — Check In</title>
  <link rel="stylesheet" href="/shared/styles.css" />
</head>
<body class="checkinPage">
  <main class="mobileShell checkinShell">
    <section class="card checkinCard">
      <img src="/assets/barfly-social-logo.png" alt="Pelican to Murder" class="joinMiniLogo" />
      <p class="introKicker">Venue Check-In</p>
      <h1 id="sessionTitle">Pelican to Murder</h1>
      <p id="sessionMeta" class="muted">Loading session...</p>
      <div class="statusPills centerPills" id="sessionPills"></div>
      <div id="checkinSuccess" class="successBox hidden"></div>
      <form id="checkinForm" class="formStack">
        <label>10-Digit Phone Number or 5-Digit Check-In Code</label>
        <input id="accessCode" autocomplete="tel" inputmode="tel" maxlength="32" required placeholder="" />
        <button class="rsvpCta" type="submit">Check In</button>
      </form>
      <p id="checkinError" class="errorText"></p>
      <p class="mini">Check-in confirms you are physically present and sends you to the waiting room. Keep your page open until the host starts the game.</p>
    </section>
  </main>
  <script src="/checkin/checkin.js"></script>
</body>
</html>
