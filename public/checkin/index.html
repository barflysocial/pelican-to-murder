<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Pelican to Murder — Check In</title>
  <link rel="stylesheet" href="/shared/styles.css" />
</head>
<body class="checkinPage">
  <main class="mobileShell checkinShell">
    <section class="card checkinCard">
      <img src="/assets/barfly-social-logo.png" alt="Pelican to Murder" class="joinMiniLogo" />
      <p class="introKicker">Venue Check-In</p>
      <h1 id="sessionTitle">Pelican to Murder</h1>
      <p id="sessionMeta" class="muted">Loading session...</p>
      <div class="statusPills centerPills" id="sessionPills"></div>
      <div id="checkinSuccess" class="successBox hidden"></div>
      <form id="checkinForm" class="formStack">
        <label>First Name</label>
        <input id="firstName" autocomplete="given-name" required />
        <label>Last Name</label>
        <input id="lastName" autocomplete="family-name" required />
        <label>Instagram <span class="muted">optional</span></label>
        <input id="instagram" autocomplete="off" placeholder="@yourhandle" />
        <label>Phone or Email <span class="muted">optional but helpful</span></label>
        <input id="contact" autocomplete="email" placeholder="Used only to match your RSVP" />
        <label>Access Code</label>
        <input id="accessCode" autocomplete="one-time-code" maxlength="32" required />
        <button class="rsvpCta" type="submit">Check In</button>
      </form>
      <p id="checkinError" class="errorText"></p>
      <p class="mini">Check-in confirms you are physically present. It does not start the game. Enter the game from the normal access-code screen when the host instructs you.</p>
    </section>
  </main>
  <script src="/checkin/checkin.js"></script>
</body>
</html>
